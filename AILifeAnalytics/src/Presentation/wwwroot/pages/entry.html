<section id="page-entry" class="page active">
    <div class="page-header">
        <div>
            <h1 class="page-title">Новая запись</h1>
            <p class="page-subtitle">Заполните дневник эффективности</p>
        </div>
    </div>

    <div class="form-card">
        <form id="entry-form" onsubmit="submitEntry(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Дата</label>
                    <input type="date" id="f-date" required />
                </div>
            </div>

            <div class="form-row two">
                <div class="form-group">
                    <label>Часы сна</label>
                    <div class="slider-group">
                        <input type="range" id="f-sleep" min="0" max="12" step="0.5" value="7"
                               oninput="updateSlider('sleep', this.value)" />
                        <span class="slider-val" id="sleep-val">7.0 ч</span>
                    </div>
                    <div class="slider-labels"><span>0</span><span>Идеал: 8ч</span><span>12</span></div>
                </div>

                <div class="form-group">
                    <label>Часы работы</label>
                    <div class="slider-group">
                        <input type="range" id="f-work" min="0" max="16" step="0.5" value="8"
                               oninput="updateSlider('work', this.value)" />
                        <span class="slider-val" id="work-val">8.0 ч</span>
                    </div>
                    <div class="slider-labels"><span>0</span><span>Норма: 6-8ч</span><span>16</span></div>
                </div>
            </div>

            <div class="form-row two">
                <div class="form-group">
                    <label>Уровень фокуса <span class="label-hint" id="focus-label">5</span></label>
                    <div class="rating-row" id="focus-rating">
                        <!-- generated by JS -->
                    </div>
                </div>

                <div class="form-group">
                    <label>Настроение <span class="label-hint" id="mood-label">5</span></label>
                    <div class="rating-row" id="mood-rating">
                        <!-- generated by JS -->
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Заметки <span class="optional">(необязательно)</span></label>
                <textarea id="f-notes" rows="3" placeholder="Что повлияло на день? Мысли, события..."></textarea>
            </div>

            <!-- Live preview -->
            <div class="preview-card" id="preview-card">
                <div class="preview-title">Предварительный расчёт</div>
                <div class="preview-metrics">
                    <div class="preview-metric">
                        <span class="pm-label">Продуктивность</span>
                        <span class="pm-value" id="prev-productivity">—</span>
                    </div>
                    <div class="preview-metric">
                        <span class="pm-label">Энергия</span>
                        <span class="pm-value" id="prev-energy">—</span>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-ghost" onclick="navigate('dashboard')">Отмена</button>
                <button type="submit" class="btn btn-primary" id="submit-btn">Сохранить запись</button>
            </div>
        </form>
    </div>
</section>
