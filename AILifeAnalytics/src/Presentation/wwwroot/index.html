<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Life Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <link rel="stylesheet" href="css/app.css" />
</head>
<body class="dark">

    <!-- Auth Overlay (поверх всего) -->
    <div id="auth-overlay" class="auth-overlay" style="display:none">
        <!-- контент грузится динамически -->
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">⟨AI⟩</div>
            <span class="brand-name">LifeAnalytics</span>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item" data-page="profile" onclick="navigate('profile')">
                <span class="nav-icon">✦</span><span>Мой профиль</span>
            </a>
            <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
                <span class="nav-icon">◈</span><span>Дашборд</span>
            </a>
            <a class="nav-item" data-page="entry" onclick="navigate('entry')">
                <span class="nav-icon">✦</span><span>Добавить запись</span>
            </a>
            <a class="nav-item" data-page="insights" onclick="navigate('insights')">
                <span class="nav-icon">◉</span><span>AI Инсайты</span>
            </a>
            <a class="nav-item" data-page="history" onclick="navigate('history')">
                <span class="nav-icon">≡</span><span>История</span>
            </a>
            <a class="nav-item" data-page="settings" onclick="navigate('settings')">
                <span class="nav-icon">⚙</span><span>Настройки</span>
            </a>
        </nav>

        <!-- Пользователь + выход -->
        <div class="sidebar-user">
            <div class="sidebar-user-avatar" id="sidebar-user-avatar">?</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebar-user-name">Загрузка...</div>
                <div class="sidebar-user-email" id="sidebar-user-email"></div>
            </div>
            <button class="sidebar-logout-btn" onclick="logout()" title="Выйти">⏻</button>
        </div>

        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="theme-icon">☀</span>
            </button>
            <span class="sidebar-version">v1.0.0</span>
        </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main-container"></main>

    <div class="toast" id="toast"></div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/insights.js"></script>
    <script src="/js/history.js"></script>
    <script src="/js/entry.js"></script>
    <script src="/js/settings.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
