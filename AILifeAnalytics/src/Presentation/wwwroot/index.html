<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Life Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <link rel="stylesheet" href="css/app.css" />
</head>
<body class="dark">

    <!-- Auth Overlay (поверх всего) -->
    <div id="auth-overlay" class="auth-overlay" style="display:none">
        <!-- контент грузится динамически -->
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">⟨AI⟩</div>
            <span class="brand-name">LifeAnalytics</span>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item" data-page="profile" onclick="navigate('profile')">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </span>
                <span>Мой профиль</span>
            </a>

            <a class="nav-item" data-page="achievements" onclick="navigate('achievements')">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 21h8M12 17v4" />
                        <path d="M7 4H4a1 1 0 0 0-1 1v2a4 4 0 0 0 4 4" />
                        <path d="M17 4h3a1 1 0 0 1 1 1v2a4 4 0 0 1-4 4" />
                        <path d="M6 4h12v8a6 6 0 0 1-12 0V4z" />
                    </svg>
                </span>
                <span>Достижения</span>
                <span class="nav-badge" id="achievements-badge" style="display:none">0</span>
            </a>

            <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                    </svg>
                </span>
                <span>Дашборд</span>
            </a>

            <a class="nav-item" data-page="entry" onclick="navigate('entry')">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9" />
                        <line x1="12" y1="8" x2="12" y2="16" />
                        <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>
                </span>
                <span>Добавить запись</span>
            </a>

            <a class="nav-item" data-page="insights" onclick="navigate('insights')">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                </span>
                <span>AI Инсайты</span>
            </a>

            <a class="nav-item" data-page="history" onclick="navigate('history')">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9" />
                        <polyline points="12 7 12 12 15 15" />
                    </svg>
                </span>
                <span>История</span>
            </a>

            <a class="nav-item" data-page="cbt" onclick="navigate('cbt')">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-1.14Z" />
                        <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-1.14Z" />
                    </svg>
                </span>
                <span>КПТ практики</span>
            </a>

            <a class="nav-item" data-page="settings" onclick="navigate('settings')">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                </span>
                <span>Настройки</span>
            </a>
        </nav>

        <!-- Пользователь + выход -->
        <div class="sidebar-user">
            <div class="sidebar-user-avatar" id="sidebar-user-avatar">?</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebar-user-name">Загрузка...</div>
                <div class="sidebar-user-email" id="sidebar-user-email"></div>
            </div>
            <button class="sidebar-logout-btn" onclick="logout()" title="Выйти">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </button>
        </div>

        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему">
                <span id="theme-icon">◐</span>
            </button>
            <span class="sidebar-version">v1.0.0</span>
        </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main-container"></main>

    <div class="toast" id="toast"></div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/insights.js"></script>
    <script src="/js/history.js"></script>
    <script src="/js/cbt.js"></script>
    <script src="/js/entry.js"></script>
    <script src="/js/settings.js"></script>
    <script src="/js/achievements.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
